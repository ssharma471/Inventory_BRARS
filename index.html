<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BRAR'S Month-End Inventory</title>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <style>
    :root{
      --navy:#101828;--blue:#2f6fed;--bg:#f4f7fb;--card:#fff;--line:#e4e7ec;
      --text:#172033;--muted:#667085;--danger:#b42318
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--text)}
    button,input,select{font:inherit}
    .app{min-height:100vh;display:grid;grid-template-columns:240px 1fr}
    aside{background:var(--navy);color:#fff;padding:26px 18px;display:flex;flex-direction:column}
    .brand{display:flex;align-items:center;gap:12px;margin-bottom:34px}
    .brand-badge{display:grid;place-items:center;width:42px;height:42px;border-radius:12px;background:var(--blue);font-weight:800}
    .brand b,.brand small{display:block}.brand small{color:#98a2b3;margin-top:2px}
    nav{display:grid;gap:8px}
    nav button{border:0;background:transparent;color:#cbd5e1;text-align:left;padding:12px 14px;border-radius:9px;cursor:pointer}
    nav button.active,nav button:hover{background:#1d2939;color:#fff}
    .side-note{margin-top:auto;color:#98a2b3;font-size:12px;line-height:1.55;padding:14px;background:#1d2939;border-radius:10px}
    main{padding:26px 32px;min-width:0}
    header{display:flex;align-items:center;justify-content:space-between;gap:20px}
    h1{margin:0;font-size:26px}header p{margin:5px 0 0;color:var(--muted);font-size:13px}
    .actions,.toolbar{display:flex;gap:10px;align-items:center}
    .primary,.secondary,.danger{border:0;border-radius:8px;padding:10px 14px;cursor:pointer}
    .primary{background:var(--blue);color:#fff;font-weight:650}
    .secondary{background:#fff;border:1px solid #d0d5dd;color:#344054}
    .danger{background:#fff1f0;color:var(--danger);padding:7px 10px}
    .actions input,.toolbar input,.toolbar select{border:1px solid #d0d5dd;background:#fff;border-radius:8px;padding:10px 12px}
    .cards{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin:24px 0}
    .cards div{background:#fff;border:1px solid #e5e9f0;border-radius:12px;padding:18px}
    .cards small{display:block;color:var(--muted);margin-bottom:8px}.cards strong{font-size:23px}
    .toolbar{margin-bottom:14px}.toolbar input{min-width:300px}.toolbar .primary{margin-left:auto}
    .table-wrap{background:#fff;border:1px solid var(--line);border-radius:12px;overflow:auto;max-height:60vh}
    table{width:100%;border-collapse:collapse;min-width:920px}
    th{position:sticky;top:0;background:#f8fafc;color:#475467;text-align:left;font-size:12px;text-transform:uppercase;letter-spacing:.04em;padding:12px;border-bottom:1px solid var(--line);z-index:1}
    td{padding:10px 12px;border-bottom:1px solid #eef1f5;font-size:13px}
    td.product{font-weight:600}.pill{display:inline-block;padding:4px 8px;border-radius:999px;background:#eef4ff;color:#3538cd;font-size:12px}
    .qty{width:105px;border:1px solid #cfd5df;border-radius:7px;padding:8px}.value{font-weight:700}
    .table-wrap td input,.table-wrap td select{width:100%;border:1px solid #d0d5dd;border-radius:6px;padding:7px;background:white}
    .summary{margin-top:18px}.summary h2{font-size:17px}
    .summary-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
    .summary article{background:#fff;border:1px solid var(--line);padding:14px;border-radius:10px;display:flex;justify-content:space-between}
    .history{display:grid;gap:10px}
    .history button{border:1px solid var(--line);background:#fff;border-radius:12px;padding:18px;display:flex;justify-content:space-between;text-align:left;cursor:pointer}
    .history span b,.history span small{display:block}.history span small{color:var(--muted);margin-top:5px}
    .empty{background:#fff;border:1px dashed #cfd5df;padding:30px;border-radius:12px;text-align:center;color:var(--muted)}
    .modal{position:fixed;inset:0;background:#10182899;display:none;place-items:center;z-index:10}
    .modal.show{display:grid}.modal form{width:min(430px,92vw);background:#fff;padding:24px;border-radius:14px;box-shadow:0 20px 60px #0003}
    .modal h2{margin-top:0}.modal label{display:block;font-size:13px;font-weight:600;margin:14px 0}
    .modal label input,.modal label select{display:block;width:100%;margin-top:6px;border:1px solid #d0d5dd;border-radius:8px;padding:10px}
    .modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:20px}
    .notice{margin:12px 0 0;color:var(--muted);font-size:12px}
    @media(max-width:900px){
      .app{grid-template-columns:1fr}aside{display:none}main{padding:18px}.cards{grid-template-columns:repeat(2,1fr)}
      header{align-items:flex-start;flex-direction:column}.actions{flex-wrap:wrap}.summary-grid{grid-template-columns:repeat(2,1fr)}
    }
  </style>
</head>
<body>
<div class="app">
  <aside>
    <div class="brand"><div class="brand-badge">ME</div><div><b>Month-End</b><small>Inventory</small></div></div>
    <nav>
      <button data-tab="count" class="active">Inventory Count</button>
      <button data-tab="products">Products</button>
      <button data-tab="history">Monthly History</button>
    </nav>
    <div class="side-note">Data is saved in this browser. Export the completed month to Excel for your accountant.</div>
  </aside>

  <main>
    <header>
      <div><h1 id="pageTitle">Month-End Inventory</h1><p>BRAR'S VAUGHAN</p></div>
      <div class="actions">
        <input id="monthPicker" type="month" />
        <button id="resetMonth" class="secondary">Reset Month</button>
        <button id="exportExcel" class="primary">Export Excel</button>
      </div>
    </header>

    <section class="cards">
      <div><small>Total inventory value</small><strong id="totalValue">$0.00</strong></div>
      <div><small>Active products</small><strong id="activeProducts">0</strong></div>
      <div><small>Quantities entered</small><strong id="countedProducts">0</strong></div>
      <div><small>Remaining</small><strong id="remainingProducts">0</strong></div>
    </section>

    <div id="normalView">
      <section class="toolbar">
        <input id="searchInput" placeholder="Search product or vendor…" />
        <select id="categoryFilter">
          <option>All</option><option>Finished</option><option>Packaging</option><option>Supplies</option><option>OIC</option>
        </select>
        <button id="addProduct" class="primary" style="display:none">+ Add Product</button>
      </section>

      <section class="table-wrap">
        <table>
          <thead><tr id="tableHead"></tr></thead>
          <tbody id="tableBody"></tbody>
        </table>
      </section>

      <section id="summarySection" class="summary">
        <h2>Category summary</h2>
        <div class="summary-grid" id="summaryGrid"></div>
      </section>
    </div>

    <section id="historyView" class="history" style="display:none"></section>
  </main>
</div>

<div id="modal" class="modal">
  <form id="productForm">
    <h2>Add product</h2>
    <label>Product name<input id="newName" required /></label>
    <label>Vendor<input id="newVendor" /></label>
    <label>Unit price<input id="newPrice" type="number" step="0.01" min="0" /></label>
    <label>Category
      <select id="newCategory"><option>Finished</option><option>Packaging</option><option>Supplies</option><option>OIC</option></select>
    </label>
    <div class="modal-actions">
      <button type="button" id="cancelAdd" class="secondary">Cancel</button>
      <button class="primary">Add Product</button>
    </div>
  </form>
</div>

const CATEGORIES = ["Finished","Packaging","Supplies","OIC"];
const PRODUCT_KEY = "brars-master-products-standalone-v1";
const COUNT_KEY = "brars-month-counts-standalone-v1";
let products = load(PRODUCT_KEY, SEED_PRODUCTS);
let counts = load(COUNT_KEY, {});
let currentTab = "count";
let currentMonth = new Date().toISOString().slice(0,7);

const $ = id => document.getElementById(id);
const money = n => new Intl.NumberFormat("en-CA",{style:"currency",currency:"CAD"}).format(Number(n)||0);
function load(key,fallback){try{const value=localStorage.getItem(key);return value?JSON.parse(value):fallback}catch{return fallback}}
function saveProducts(){localStorage.setItem(PRODUCT_KEY,JSON.stringify(products))}
function saveCounts(){localStorage.setItem(COUNT_KEY,JSON.stringify(counts))}
function monthCounts(){return counts[currentMonth] || {}}
function active(){return products.filter(p=>p.active!==false)}
function safeCategory(c){return CATEGORIES.includes(c)?c:"Finished"}
function summary(){
  const out={Finished:0,Packaging:0,Supplies:0,OIC:0};
  const mc=monthCounts();
  active().forEach(p=>out[safeCategory(p.category)] += Number(mc[p.id] ?? p.quantity ?? 0) * Number(p.unitPrice||0));
  return out;
}
function grandTotal(){return Object.values(summary()).reduce((a,b)=>a+b,0)}

function render(){
  $("monthPicker").value=currentMonth;
  $("pageTitle").textContent=currentTab==="count"?"Month-End Inventory":currentTab==="products"?"Product Management":"Monthly History";
  document.querySelectorAll("nav button").forEach(b=>b.classList.toggle("active",b.dataset.tab===currentTab));
  const mc=monthCounts();
  $("totalValue").textContent=money(grandTotal());
  $("activeProducts").textContent=active().length;
  $("countedProducts").textContent=active().filter(p=>mc[p.id]!==undefined).length;
  $("remainingProducts").textContent=active().length-active().filter(p=>mc[p.id]!==undefined).length;

  const history=currentTab==="history";
  $("normalView").style.display=history?"none":"block";
  $("historyView").style.display=history?"grid":"none";
  $("addProduct").style.display=currentTab==="products"?"block":"none";
  $("summarySection").style.display=currentTab==="count"?"block":"none";
  if(history){renderHistory();return}
  renderTable();
  renderSummary();
}

function filteredProducts(){
  const q=$("searchInput").value.trim().toLowerCase();
  const cat=$("categoryFilter").value;
  return active().filter(p=>(cat==="All"||safeCategory(p.category)===cat) && `${p.name} ${p.vendor||""}`.toLowerCase().includes(q));
}

function renderTable(){
  const editing=currentTab==="products";
  $("tableHead").innerHTML=editing
    ?"<th>Product</th><th>Vendor</th><th>Category</th><th>Unit Price</th><th>Action</th>"
    :"<th>Product</th><th>Vendor</th><th>Category</th><th>Unit Price</th><th>Quantity</th><th>Inventory Value</th>";
  const mc=monthCounts();
  $("tableBody").innerHTML=filteredProducts().map(p=>{
    const qty=mc[p.id] ?? p.quantity ?? "";
    if(editing){
      return `<tr>
        <td class="product"><input data-id="${p.id}" data-field="name" value="${escapeHtml(p.name)}"></td>
        <td><input data-id="${p.id}" data-field="vendor" value="${escapeHtml(p.vendor||"")}"></td>
        <td><select data-id="${p.id}" data-field="category">${CATEGORIES.map(c=>`<option ${safeCategory(p.category)===c?"selected":""}>${c}</option>`).join("")}</select></td>
        <td><input data-id="${p.id}" data-field="unitPrice" type="number" step="0.01" min="0" value="${Number(p.unitPrice||0)}"></td>
        <td><button class="danger deactivate" data-id="${p.id}">Deactivate</button></td>
      </tr>`;
    }
    return `<tr>
      <td class="product">${escapeHtml(p.name)}</td>
      <td>${escapeHtml(p.vendor||"—")}</td>
      <td><span class="pill">${safeCategory(p.category)}</span></td>
      <td>${money(p.unitPrice)}</td>
      <td><input class="qty" data-qty="${p.id}" type="number" min="0" step="0.01" value="${qty}"></td>
      <td class="value">${money(Number(p.unitPrice||0)*Number(qty||0))}</td>
    </tr>`;
  }).join("");

  document.querySelectorAll("[data-qty]").forEach(el=>el.addEventListener("input",e=>{
    counts[currentMonth] ||= {};
    counts[currentMonth][e.target.dataset.qty]=e.target.value===""?0:Number(e.target.value);
    saveCounts();render();
  }));
  document.querySelectorAll("[data-field]").forEach(el=>el.addEventListener("change",e=>{
    const p=products.find(x=>x.id===e.target.dataset.id);
    if(!p)return;
    p[e.target.dataset.field]=e.target.dataset.field==="unitPrice"?Number(e.target.value):e.target.value;
    if(e.target.dataset.field==="category")p.category=safeCategory(e.target.value);
    saveProducts();render();
  }));
  document.querySelectorAll(".deactivate").forEach(el=>el.addEventListener("click",e=>{
    if(!confirm("Deactivate this product? It will remain in saved historical records."))return;
    const p=products.find(x=>x.id===e.target.dataset.id);if(p)p.active=false;saveProducts();render();
  }));
}

function renderSummary(){
  const s=summary();
  $("summaryGrid").innerHTML=CATEGORIES.map(c=>`<article><span>${c}</span><b>${money(s[c])}</b></article>`).join("");
}

function renderHistory(){
  const months=Object.keys(counts).sort().reverse();
  $("historyView").innerHTML=months.length?months.map(m=>{
    const c=counts[m]||{};
    const value=active().reduce((sum,p)=>sum+Number(c[p.id]||0)*Number(p.unitPrice||0),0);
    return `<button data-month="${m}"><span><b>${m}</b><small>${Object.keys(c).length} quantities saved</small></span><strong>${money(value)}</strong></button>`;
  }).join(""):'<div class="empty">No saved months yet. Enter quantities in Inventory Count to create history.</div>';
  document.querySelectorAll("[data-month]").forEach(b=>b.addEventListener("click",()=>{currentMonth=b.dataset.month;currentTab="count";render()}));
}

function exportExcel(){
  if(typeof XLSX==="undefined"){alert("Excel export library could not load. Check your internet connection and try again.");return}
  const mc=monthCounts();
  const rows=active().map(p=>({
    "Name":p.name,
    "Vendor":p.vendor||"",
    "Unit Price":Number(p.unitPrice||0),
    "Quantity in Stock":Number(mc[p.id]??p.quantity??0),
    "Inventory Value":Number(p.unitPrice||0)*Number(mc[p.id]??p.quantity??0),
    "Category":safeCategory(p.category)
  }));
  const ws=XLSX.utils.json_to_sheet(rows,{origin:"A4"});
  XLSX.utils.sheet_add_aoa(ws,[["BRAR'S VAUGHAN","",`Month-End Inventory: ${currentMonth}`]],{origin:"A1"});
  const firstDataRow=5,lastDataRow=firstDataRow+rows.length-1,summaryStart=lastDataRow+4,s=summary(),total=grandTotal();
  XLSX.utils.sheet_add_aoa(ws,[["","","","Total Inventory Value",total]],{origin:`A${summaryStart}`});
  CATEGORIES.forEach((c,i)=>XLSX.utils.sheet_add_aoa(ws,[["",c,"=","",Number(s[c]||0)]],{origin:`A${summaryStart+2+i}`}));
  ws["!cols"]=[{wch:48},{wch:20},{wch:14},{wch:18},{wch:18},{wch:18}];
  ws["!autofilter"]={ref:`A4:F${lastDataRow}`};
  ws["!merges"]=[{s:{r:0,c:0},e:{r:0,c:1}}];
  for(let r=firstDataRow;r<=lastDataRow;r++){if(ws[`C${r}`])ws[`C${r}`].z="$#,##0.00";if(ws[`D${r}`])ws[`D${r}`].z="0.00";if(ws[`E${r}`])ws[`E${r}`].z="$#,##0.00"}
  if(ws[`E${summaryStart}`])ws[`E${summaryStart}`].z="$#,##0.00";
  CATEGORIES.forEach((_,i)=>{if(ws[`E${summaryStart+2+i}`])ws[`E${summaryStart+2+i}`].z="$#,##0.00"});
  const sws=XLSX.utils.json_to_sheet(CATEGORIES.map(c=>({Category:c,"Inventory Value":Number(s[c]||0)})));
  XLSX.utils.sheet_add_aoa(sws,[["Grand Total",total]],{origin:-1});sws["!cols"]=[{wch:24},{wch:20}];
  for(let r=2;r<=6;r++){if(sws[`B${r}`])sws[`B${r}`].z="$#,##0.00"}
  const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,"Inventory");XLSX.utils.book_append_sheet(wb,sws,"Summary");
  XLSX.writeFile(wb,`${currentMonth}-month-end-inventory.xlsx`);
}

function escapeHtml(value){return String(value??"").replace(/[&<>"']/g,ch=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[ch]))}

document.querySelectorAll("nav button").forEach(b=>b.addEventListener("click",()=>{currentTab=b.dataset.tab;render()}));
$("monthPicker").addEventListener("change",e=>{currentMonth=e.target.value;render()});
$("searchInput").addEventListener("input",render);
$("categoryFilter").addEventListener("change",render);
$("resetMonth").addEventListener("click",()=>{if(confirm(`Reset all quantities for ${currentMonth}?`)){counts[currentMonth]={};saveCounts();render()}});
$("exportExcel").addEventListener("click",exportExcel);
$("addProduct").addEventListener("click",()=>$("modal").classList.add("show"));
$("cancelAdd").addEventListener("click",()=>$("modal").classList.remove("show"));
$("productForm").addEventListener("submit",e=>{
  e.preventDefault();
  const name=$("newName").value.trim();if(!name)return;
  const duplicate=products.some(p=>p.name.trim().toLowerCase()===name.toLowerCase()&&p.active!==false);
  if(duplicate){alert("This product already exists.");return}
  products.push({id:"custom-"+Date.now(),name,vendor:$("newVendor").value.trim(),unitPrice:Number($("newPrice").value)||0,quantity:0,category:safeCategory($("newCategory").value),active:true});
  saveProducts();e.target.reset();$("modal").classList.remove("show");render();
});

render();
</script>
